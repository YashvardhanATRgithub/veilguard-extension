<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VeilGuard — Private Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="chat.css" />
</head>

<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <svg class="brand-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        <path d="M9 12l2 2 4-4" />
                    </svg>
                    <span>Private Chat</span>
                </div>
                <button class="btn-new-chat" id="newChatBtn" title="New chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                </button>
            </div>
            <div class="sidebar-conversations" id="conversationList">
                <!-- Filled by JS -->
            </div>
            <div class="sidebar-footer">
                <div class="sidebar-status">
                    <span class="status-dot" id="sidebarStatusDot"></span>
                    <span id="sidebarStatusText">Checking…</span>
                </div>
                <select class="sidebar-model-select" id="modelSelect">
                    <option value="">Loading…</option>
                </select>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="chat-main">
            <!-- Top Bar -->
            <div class="chat-topbar">
                <button class="btn-toggle-sidebar" id="toggleSidebar" title="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18" />
                    </svg>
                </button>
                <div class="topbar-title" id="chatTitle">New Chat</div>
                <div class="topbar-actions">
                    <button class="btn-icon" id="deleteChatBtn" title="Delete chat">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                            <path d="M9 12l2 2 4-4" />
                        </svg>
                    </div>
                    <h2>Private Chat</h2>
                    <p>100% local &amp; offline. Your messages never leave this device.</p>
                    <div class="welcome-chips">
                        <button class="chip" data-prompt="Explain quantum computing in simple terms">Explain quantum
                            computing</button>
                        <button class="chip" data-prompt="Write a Python function to sort a list">Python sort
                            function</button>
                        <button class="chip" data-prompt="What are the best practices for API security?">API security
                            tips</button>
                        <button class="chip" data-prompt="Summarize the key ideas of stoicism">Summarize
                            stoicism</button>
                    </div>
                </div>
            </div>

            <!-- Input -->
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="chatInput" class="chat-input" placeholder="Type a message…" rows="1"></textarea>
                    <button class="btn-send" id="sendBtn" disabled title="Send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span class="input-hint">Powered by Ollama · Fully offline · <span
                            id="modelLabel">qwen2.5:1.5b</span></span>
                </div>
            </div>
        </main>
    </div>
    <script src="chat.js"></script>
</body>

</html>
